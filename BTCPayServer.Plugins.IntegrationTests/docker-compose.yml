services:
  
  tests:
    build:
      context: ..
      dockerfile: BTCPayServer.Plugins.IntegrationTests/Dockerfile
    environment:
      TESTS_POSTGRES: User ID=postgres;Include Error Detail=true;Host=postgres;Port=5432;Database=btcpayserver
      TESTS_HOSTNAME: tests
      TESTS_INCONTAINER: "true"
      BTCPAY_XMR_DAEMON_URI: http://node_1:18081
      BTCPAY_XMR_WALLET_DAEMON_URI: http://xmr_wallet:18082
      BTCPAY_XMR_CASHCOW_WALLET_DAEMON_URI: http://xmr_cashcow_wallet:18092
      BTCPAY_XMR_WALLET_DAEMON_WALLETDIR: /wallet
      BTCPAY_NODEFAULTCHAIN: "true"
    depends_on:
      - postgres
      - xmr_wallet
      - xmr_cashcow_wallet
    extra_hosts:
      - "tests:127.0.0.1"
    volumes:
      - ../coverage:/coverage
      - xmr_wallet:/wallet

  # The dev container is not used, it is just handy to run `docker-compose up dev` to start all services
  dev:
    image: alpine:3.7
    container_name: dev
    command: [ "/bin/sh", "-c", "trap : TERM INT; while :; do echo Ready to code and debug like a rockstar!!!; sleep 2073600; done & wait" ]
    depends_on:
      - postgres
      - xmr_wallet
      - xmr_cashcow_wallet

  node_1:
    image: btcpayserver/monero:0.18.4.3
    container_name: node_1
    command: [
      "monerod",
      "--fixed-difficulty=150",
      "--p2p-bind-ip=0.0.0.0",
      "--p2p-bind-port=18080",
      "--rpc-bind-port=18081",
      "--log-level=2",
      "--rpc-bind-ip=0.0.0.0",
      "--confirm-external-bind",
      "--add-exclusive-node=node_2:28080",
      "--block-notify=/bin/sh ./scripts/notifier.sh -k -X GET https://host.docker.internal:14142/monerolikedaemoncallback/block?cryptoCode=xmr&hash=%s",
      "--testnet",
      "--no-igd",
      "--hide-my-port",
      "--non-interactive"
    ]
    volumes:
      - xmr_node_1_data:/data
    ports:
      - "18080:18080"
      - "18081:18081"

  node_2:
    image: btcpayserver/monero:0.18.4.3
    container_name: node_2
    command: [
      "monerod",
      "--fixed-difficulty=150",
      "--p2p-bind-ip=0.0.0.0",
      "--p2p-bind-port=28080",
      "--rpc-bind-port=28081",
      "--log-level=2",
      "--rpc-bind-ip=0.0.0.0",
      "--confirm-external-bind",
      "--testnet",
      "--add-exclusive-node=node_1:18080",
      "--no-igd",
      "--hide-my-port",
      "--non-interactive"
    ]
    volumes:
      - xmr_node_2_data:/data
    ports:
      - "28080:28080"
      - "28081:28081"
    depends_on:
      - node_1

  xmr_wallet:
    image: btcpayserver/monero:0.18.4.3
    container_name: xmr_wallet
    command: [
      "monero-wallet-rpc",
      "--log-level=2",
      "--allow-mismatched-daemon-version",
      "--rpc-bind-ip=0.0.0.0",
      "--testnet",
      "--disable-rpc-login",
      "--confirm-external-bind",
      "--rpc-bind-port=18082",
      "--non-interactive",
      "--trusted-daemon",
      "--daemon-address=node_2:28081",
      "--wallet-dir=/wallet",
      "--tx-notify=/bin/sh ./scripts/notifier.sh -k -X GET https://host.docker.internal:14142/monerolikedaemoncallback/tx?cryptoCode=xmr&hash=%s"
    ]
    ports:
      - "18082:18082"
    volumes:
      - xmr_wallet:/wallet
    depends_on:
      - node_1
      - node_2

  xmr_cashcow_wallet:
    image: btcpayserver/monero:0.18.4.3
    container_name: xmr_cashcow_wallet
    command: [
      "monero-wallet-rpc",
      "--log-level=2",
      "--allow-mismatched-daemon-version",
      "--rpc-bind-ip=0.0.0.0",
      "--testnet",
      "--disable-rpc-login",
      "--confirm-external-bind",
      "--rpc-bind-port=18092",
      "--non-interactive",
      "--trusted-daemon",
      "--daemon-address=node_2:28081",
      "--wallet-dir=/wallet"
    ]
    ports:
      - "18092:18092"
    volumes:
      - "xmr_cashcow_wallet:/wallet"
    depends_on:
      - node_1
      - node_2

  postgres:
    image: postgres:18.1
    container_name: postgres
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "39372:5432"
    expose:
      - "5432"

volumes:
  xmr_node_1_data:
  xmr_node_2_data:
  xmr_wallet:
  xmr_cashcow_wallet: